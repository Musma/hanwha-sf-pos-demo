<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
:root{--orange-50:#ed7100;--titlebar:#22262c;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Pretendard',sans-serif;-webkit-font-smoothing:antialiased;}
</style>
</helmet>
<div style="width:100%;">
  <div style="height:26px;background:var(--titlebar);display:flex;align-items:center;padding:0 8px;color:#c7ccd2;font-size:11px;">
    <span style="width:12px;height:12px;background:var(--orange-50);border-radius:2px;display:inline-block;margin-right:8px;"></span>
    <span style="opacity:.85;">SF-POS [Smart Factory - Assembly Placement and Planning Operation System]</span>
    <div style="margin-left:auto;display:flex;gap:14px;color:#aeb4bb;font-size:14px;">
      <i class="ti ti-minus"></i><i class="ti ti-square"></i><i class="ti ti-x"></i>
    </div>
  </div>
  <div style="height:50px;background:#fff;border-bottom:1px solid #d8dbdf;display:flex;align-items:center;padding:0 18px;">
    <span style="font-size:24px;font-weight:800;letter-spacing:-1px;color:var(--orange-50);font-style:italic;">SF-POS</span>
    <span style="margin-left:26px;font-size:13px;color:#6a6e73;">Smart Factory - Assembly Placement and Planning Operation System</span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:18px;color:#5b6167;">
      <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:#3f4348;"><i class="ti ti-user-filled" style="font-size:16px;"></i>이길민 (8724855)</span>
      <div style="display:flex;gap:15px;font-size:18px;color:#7a7f85;">
        <i class="ti ti-refresh"></i><i class="ti ti-bell"></i><i class="ti ti-x"></i><i class="ti ti-logout"></i><i class="ti ti-power"></i>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:76}}"></script>
</body>
</html>
